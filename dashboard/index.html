<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>polybot dashboard</title>
<style>
  :root{
    --bg:#0b0f14; --card:#141b24; --card2:#1a232e; --line:#243040;
    --tx:#e8eef5; --mut:#8a99ab; --acc:#3ba3ff;
    --green:#37d67a; --red:#ff5c6c; --amber:#ffb020; --purple:#b088ff; --blue:#4aa8ff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;padding-bottom:40px}
  .wrap{max-width:920px;margin:0 auto;padding:16px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:6px 0 14px}
  .brand{display:flex;align-items:center;gap:10px}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green)}
  h1{font-size:18px;margin:0;letter-spacing:.2px}
  .sub{font-size:12px;color:var(--mut);margin-top:2px}
  button{background:var(--card2);color:var(--tx);border:1px solid var(--line);
    border-radius:10px;padding:8px 12px;font-size:13px;cursor:pointer}
  button:active{transform:scale(.97)}
  .tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
  @media(min-width:640px){.tiles{grid-template-columns:repeat(4,1fr)}}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px}
  .tile .k{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.6px}
  .tile .v{font-size:22px;font-weight:700;margin-top:4px}
  .tile .v small{font-size:12px;font-weight:600;color:var(--mut)}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .chip{font-size:12px;padding:6px 11px;border-radius:999px;border:1px solid var(--line);
    background:transparent;color:var(--mut)}
  .chip.on{background:var(--acc);border-color:var(--acc);color:#04121f;font-weight:600}
  .list{display:flex;flex-direction:column;gap:8px}
  .row{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px}
  .row .top{display:flex;align-items:center;gap:8px;justify-content:space-between}
  .badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.4px}
  .b-ikut{background:rgba(55,214,122,.15);color:var(--green)}
  .b-skip{background:rgba(255,176,32,.15);color:var(--amber)}
  .b-disc{background:rgba(74,168,255,.15);color:var(--blue)}
  .b-arb{background:rgba(176,136,255,.15);color:var(--purple)}
  .b-def{background:rgba(138,153,171,.15);color:var(--mut)}
  .b-win{background:rgba(55,214,122,.15);color:var(--green)}
  .b-lose{background:rgba(255,92,108,.15);color:var(--red)}
  .time{font-size:11px;color:var(--mut);white-space:nowrap}
  .mkt{font-size:14px;font-weight:600;margin:7px 0 3px;line-height:1.3}
  .meta{font-size:12px;color:var(--mut);display:flex;flex-wrap:wrap;gap:5px 12px}
  .meta b{color:var(--tx);font-weight:600}
  .strat{font-size:11px;color:var(--mut)}
  .empty,.err{text-align:center;color:var(--mut);padding:40px 10px;font-size:14px}
  .err{color:var(--red)}
  .foot{text-align:center;color:var(--mut);font-size:11px;margin-top:18px;line-height:1.6}
  .pulse{animation:p 1.4s ease-in-out infinite}@keyframes p{50%{opacity:.35}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="dot" id="dot"></span>
      <div>
        <h1>polybot dashboard</h1>
        <div class="sub" id="sub">memuat…</div>
      </div>
    </div>
    <button id="refresh">↻ refresh</button>
  </header>

  <div class="tiles" id="tiles"></div>
  <div class="chips" id="chips"></div>
  <div class="list" id="list"><div class="empty pulse">memuat data…</div></div>

  <div class="foot">
    Sumber: <code>data/riwayat.csv</code> (repo public) · paper trading / simulasi ·
    auto-refresh 60 dtk<br>bukan financial advice
  </div>
</div>

<script>
const CSV_URL = "https://raw.githubusercontent.com/kumaraprayoga68-sketch/polybot/main/data/riwayat.csv";
let ROWS = [], FILTER = "all";

function parseCSV(text){
  const lines = text.replace(/\r/g,"").split("\n").filter(l=>l.length);
  if(!lines.length) return [];
  const head = splitLine(lines[0]);
  const out = [];
  for(let i=1;i<lines.length;i++){
    const c = splitLine(lines[i]);
    if(c.length < 2) continue;
    const o = {};
    head.forEach((h,idx)=>o[h]=c[idx]!==undefined?c[idx]:"");
    out.push(o);
  }
  return out;
}
function splitLine(line){
  const res=[]; let cur=""; let q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(q){
      if(ch === '"'){ if(line[i+1]==='"'){cur+='"';i++;} else q=false; }
      else cur+=ch;
    } else {
      if(ch === '"') q=true;
      else if(ch === ',') { res.push(cur); cur=""; }
      else cur+=ch;
    }
  }
  res.push(cur); return res;
}

function relTime(iso){
  const t=new Date(iso); if(isNaN(t)) return "";
  const s=Math.floor((Date.now()-t.getTime())/1000);
  if(s<60) return s+"d lalu";
  if(s<3600) return Math.floor(s/60)+"m lalu";
  if(s<86400) return Math.floor(s/3600)+"j lalu";
  return Math.floor(s/86400)+"h lalu";
}
function badgeClass(aksi,r){
  if(r.resolved){ if(isWin(r)) return ["b-win","MENANG"]; return ["b-lose","KALAH"]; }
  if(aksi==="ikut") return ["b-ikut","ikut"];
  if(aksi&&aksi.indexOf("skip")===0) return ["b-skip","skip"];
  if(aksi==="discovery") return ["b-disc","scan"];
  if(aksi==="arbitrage"||aksi==="arb") return ["b-arb","arb"];
  return ["b-def",aksi||"—"];
}
function isWin(r){
  const m=(r.menang||"").toString().toLowerCase();
  return ["1","true","yes","ya","win","menang","w"].includes(m);
}
function num(x){const n=parseFloat(x);return isNaN(n)?0:n;}
function esc(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

function render(){
  const tiles=document.getElementById("tiles");
  const ikut=ROWS.filter(r=>r.aksi==="ikut");
  const resolved=ROWS.filter(r=>r.resolved);
  const win=resolved.filter(isWin).length;
  const lose=resolved.length-win;
  const exposure=ikut.reduce((a,r)=>a+num(r.size_usd),0);
  const pnl=resolved.reduce((a,r)=>a+num(r.pnl),0);
  tiles.innerHTML=[
    ["Total event",ROWS.length,""],
    ["Ikut (bet)",ikut.length,""],
    ["Exposure paper","$"+exposure.toFixed(1),""],
    ["Resolved",resolved.length,`<small> ${win}W · ${lose}L</small>`],
  ].map(([k,v,x])=>`<div class="tile"><div class="k">${k}</div><div class="v">${v}${x}</div></div>`).join("");

  const strats=["all","copytrade","arbitrage","scanner"];
  document.getElementById("chips").innerHTML=strats.map(s=>
    `<button class="chip ${FILTER===s?'on':''}" data-f="${s}">${s==='all'?'semua':s}</button>`).join("");
  document.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{FILTER=c.dataset.f;render();});

  let view=ROWS.slice();
  if(FILTER!=="all") view=view.filter(r=>r.strategi===FILTER);
  view.sort((a,b)=>(b.timestamp||"").localeCompare(a.timestamp||""));
  view=view.slice(0,300);

  const list=document.getElementById("list");
  if(!view.length){list.innerHTML='<div class="empty">Belum ada event untuk filter ini.</div>';return;}
  list.innerHTML=view.map(r=>{
    const [bc,bt]=badgeClass(r.aksi,r);
    const harga=r.harga?`@ $${r.harga}`:"";
    const size=num(r.size_usd)?`<span>💵 <b>$${num(r.size_usd).toFixed(2)}</b></span>`:"";
    const outcome=r.outcome?`<span>🎯 <b>${esc(r.outcome)}</b> ${harga}</span>`:"";
    const end=r.end_date?`<span>📅 resolve ${esc((r.end_date||'').slice(0,10))}</span>`:"";
    const skor=r.skor?`<span>skor ${esc(r.skor)}</span>`:"";
    const ket=r.keterangan?`<span>${esc(r.keterangan)}</span>`:"";
    return `<div class="row">
      <div class="top">
        <span class="badge ${bc}">${esc(bt)}</span>
        <span class="time">${relTime(r.timestamp)}</span>
      </div>
      <div class="mkt">${esc(r.market||"—")}</div>
      <div class="meta">${outcome}${size}${end}${skor}</div>
      <div class="meta"><span class="strat">${esc(r.strategi)} · ${esc(r.mode||'')}</span>${ket?' · '+ket:''}</div>
    </div>`;
  }).join("");
}

async function load(){
  const dot=document.getElementById("dot"), sub=document.getElementById("sub");
  dot.style.background="var(--amber)";sub.textContent="menyegarkan…";
  try{
    const r=await fetch(CSV_URL+"?t="+Date.now(),{cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    ROWS=parseCSV(await r.text());
    render();
    dot.style.background="var(--green)";
    sub.textContent=`${ROWS.length} event · update ${new Date().toLocaleTimeString('id-ID')}`;
  }catch(e){
    dot.style.background="var(--red)";
    sub.textContent="gagal memuat";
    document.getElementById("list").innerHTML=`<div class="err">Gagal ambil data.<br>${esc(e.message)}</div>`;
  }
}
document.getElementById("refresh").onclick=load;
load();
setInterval(load,60000);
</script>
</body>
</html>
